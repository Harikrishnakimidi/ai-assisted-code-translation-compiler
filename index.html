
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aravind | Code Translation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #050505;
            --bg-secondary: #0a0a0a;
            --accent: #6366f1;
            --border-white: rgba(255, 255, 255, 0.04);
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-primary);
            color: #ffffff;
            overflow: hidden;
        }
        .mono {
            font-family: 'JetBrains Mono', monospace;
        }
        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(24px);
            border: 1px solid var(--border-white);
        }
        .sidebar-glass {
            background: rgba(8, 8, 8, 0.7);
            backdrop-filter: blur(30px);
            border-right: 1px solid var(--border-white);
        }
        .orb-container {
            position: relative;
            width: 120px;
            height: 120px;
        }
        .orb-inner {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #a5b4fc 0%, #6366f1 50%, #312e81 100%);
            border-radius: 50%;
            filter: blur(2px);
            box-shadow: 
                0 0 40px rgba(99, 102, 241, 0.4),
                inset 0 0 20px rgba(255, 255, 255, 0.4);
            animation: pulse-orb 8s ease-in-out infinite;
        }
        .orb-glow {
            position: absolute;
            inset: -20px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
            filter: blur(20px);
            animation: pulse-glow 8s ease-in-out infinite;
        }
        @keyframes pulse-orb {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.05); filter: brightness(1.2); }
        }
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .prose table {
            width: 100%;
            margin: 1rem 0;
            border-collapse: collapse;
            font-size: 11px;
            color: #a3a3a3;
        }
        .prose th { text-align: left; padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); color: white; }
        .prose td { padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.02); }
    </style>
